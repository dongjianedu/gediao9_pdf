<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>格调人物 - 第1页</title>
    <style>
        @page {
            size: 774px 1095px;
            margin: 0;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: "Microsoft YaHei", sans-serif;
            background: #fff;
            color: #333;
            line-height: 1.8;
            padding: 20px;
            width: 774px;
            margin: 0 auto;
        }
        .header {
            text-align: right;
            color: #0078d4;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .title {
            font-size: 64px;
            color: #e60012;
            text-align: center;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #0078d4;
            font-size: 16px;
            margin-bottom: 30px;
            border-top: 1px solid #ccc;
            padding-top: 10px;
        }
        .content {
            display: grid;
            grid-template-columns: calc(734px * 5 / 14) 30px 1fr;
        }
        .left-column {
            grid-column: 1;
            font-size: 14px;
            color: #666;
        }
        .gutter {
            grid-column: 2;
        }
        .right-column {
            grid-column: 3;
            text-align: center;
        }
        .image-wrapper {
            display: table;
            width: 100%;
            height: 500px;
            margin-bottom: 20px;
        }
        .image-placeholder {
            display: table-cell;
            width: 100%;
            height: 500px;
            background: #f0f0f0;
            border: 1px dashed #ccc;
            vertical-align: middle;
            text-align: center;
            color: #999;
        }
        .part-title {
            color: #e60012;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
        }
        .question {
            color: #e60012;
            font-weight: bold;
            font-size: 16px;
            margin-top: 20px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="header">{{FILL:header_date}}</div>
    <div class="title">格调人物</div>
    <div class="subtitle">{{FILL:subtitle_html}}</div>
    
    <div class="content">
        <div class="left-column">
            <p><strong>嘉宾简介：</strong>{{FILL:bio}}</p>
        </div>

        <div class="gutter"></div>

        <div class="right-column">
            <div class="image-wrapper">
                {{FILL:guest_image}}
            </div>
            <div class="part-title">{{FILL:part_title}}</div>
            <div class="question">{{FILL:q1_question}}</div>
            <p style="font-size:13px;color:#666;margin-top:15px;line-height:2;text-align:left;">{{FILL:intro_text}}</p>
        </div>
    </div>
</body>
</html>
