<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>格调人物 - 第5页</title>
    <style>
        @page {
            size: 774px 1095px;
            margin: 0;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: "Microsoft YaHei", sans-serif;
            background: #fff;
            color: #333;
            line-height: 1.8;
            padding: 20px;
            width: 774px;
            margin: 0 auto;
        }
        .content {
            display: grid;
            grid-template-columns: 248px 30px 1fr;
        }
        .left-column {
            grid-column: 1;
            font-size: 14px;
            text-align: justify;
        }
        .gutter {
            grid-column: 2;
        }
        .right-column {
            grid-column: 3;
            font-size: 14px;
            text-align: justify;
        }
        .image-placeholder {
            width: 100%;
            height: 200px;
            background: #f0f0f0;
            border: 1px dashed #ccc;
            display: table-cell;
            vertical-align: middle;
            text-align: center;
            color: #999;
        }
        .image-wrapper {
            display: table;
            width: 100%;
            height: 200px;
            margin-bottom: 20px;
        }
        .left-column .question, .right-column .question {
            font-weight: bold;
            font-size: 16px;
            margin-top: 20px;
            margin-bottom: 10px;
        }
        .left-column .question {
            color: #0078d4;
        }
        .right-column .question {
            color: #e60012;
        }
        .question:empty { display: none; }
        .left-column, .right-column { padding-top: 5px; }
        .left-text {
            font-size: 14px;
            padding: 20px;
            background: #f9f9f9;
            margin-bottom: 20px;
        }
        .left-text p {
            margin-bottom: 15px;
            text-indent: 2em;
        }
        .right-column p {
            margin-bottom: 15px;
            text-indent: 2em;
        }
    </style>
</head>
<body>
    <div class="content">
        <div class="left-column">
            <div class="image-wrapper">
                {{FILL:guest_image}}
            </div>
            <div class="left-text">
{{FILL:left_text}}
            </div>
        </div>

        <div class="gutter"></div>

        <div class="right-column">
            <div class="question">{{FILL:right_q4_question}}</div>
{{FILL:right_q4_answer}}

        </div>
    </div>
</body>
</html>
